apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-route
  namespace: default
spec:
  parentRefs:
  - name: gateway
    namespace: default
    sectionName: http-listener
  hostnames:
  - "demo.kurlinz.com"
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: opentelemetry-demo-frontendproxy
      port: 8080